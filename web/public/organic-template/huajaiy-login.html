<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="เข้าสู่ระบบ HUAJAIY" />
    <title>เข้าสู่ระบบ | HUAJAIY</title>
    <link rel="stylesheet" href="/purdue-template/assets/bootstrap/css/bootstrap.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/purdue-template/assets/webfonts/themify-icons.css" />
    <link rel="stylesheet" href="/purdue-template/assets/css/all.min.css" />
    <link rel="stylesheet" href="/purdue-template/assets/owlcarousel/css/owl.carousel.css" />
    <link rel="stylesheet" href="/purdue-template/assets/owlcarousel/css/owl.theme.css" />
    <link rel="stylesheet" href="/purdue-template/assets/css/slicknav.css" />
    <link rel="stylesheet" href="/purdue-template/assets/css/magnific-popup.css" />
    <link rel="stylesheet" href="/purdue-template/assets/css/jquery-simple-mobilemenu.css" />
    <link rel="stylesheet" href="/purdue-template/assets/css/animate.css" />
    <link rel="stylesheet" href="/purdue-template/assets/css/style.css" />
    <style>
      .hui-line-btn {
        background-color: #06c755;
        border: 1px solid #06c755;
        color: #fff;
        font-weight: 600;
      }
      .hui-line-btn:hover {
        background-color: #05b34c;
        border-color: #05b34c;
        color: #fff;
      }
      .hui-alt-toggle {
        color: #0d6efd;
        font-weight: 500;
        text-decoration: none;
      }
      .hui-alt-toggle:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body class="bg-light">
    <section
      class="login_register section-padding"
      style="min-height: 100vh; display: flex; align-items: center"
    >
      <div class="container">
        <div class="row">
          <div class="col-lg-6 offset-lg-3 col-xs-12">
            <div class="login">
              <h4 class="login_register_title">เข้าสู่ระบบ</h4>
              <p class="text-center text-muted small mb-4">แนะนำให้เข้าด้วยบัญชี LINE</p>

              <div class="form-group col-lg-12 px-0">
                <a
                  href="/login/line?auto=1"
                  target="_top"
                  rel="noopener"
                  class="btn hui-line-btn w-100 rounded-pill py-3 text-uppercase"
                >
                  <i class="fa-brands fa-line me-2" aria-hidden="true"></i>
                  เข้าสู่ระบบด้วย LINE
                </a>
              </div>

              <div class="text-center mt-3 mb-0">
                <button
                  type="button"
                  class="btn btn-link hui-alt-toggle p-0 border-0"
                  data-bs-toggle="collapse"
                  data-bs-target="#hui-alt-login"
                  aria-expanded="false"
                  aria-controls="hui-alt-login"
                >
                  เข้าระบบด้วยวิธีอื่น
                </button>
              </div>

              <div class="collapse mt-4" id="hui-alt-login">
                <hr class="my-3" />
                <p class="login_register_title text-center mb-3" style="font-size: 1.05rem">
                  เป็นสมาชิกแล้ว? เข้าสู่ระบบ:
                </p>
                <div class="form-group">
                  <label for="hui-username">ชื่อผู้ใช้ <span class="text-muted fw-normal">(Username)</span></label>
                  <input
                    type="text"
                    id="hui-username"
                    class="form-control requiredField input-label"
                    name="username"
                    autocomplete="username"
                  />
                </div>
                <div class="form-group">
                  <label for="hui-password">รหัสผ่าน <span class="text-muted fw-normal">(Password)</span></label>
                  <input
                    type="password"
                    id="hui-password"
                    class="form-control requiredField input-label"
                    name="password"
                    autocomplete="current-password"
                  />
                </div>
                <div class="form-group col-lg-12">
                  <button class="btn_one" type="button" id="hui-login-btn">Login</button>
                </div>
              </div>

              <p class="mt-4 mb-0">
                ยังไม่มีบัญชี?
                <a href="/register" target="_top" rel="noopener">สมัครเลย</a>
              </p>
              <p class="small text-muted mt-3 mb-0">
                <a href="/" target="_top" rel="noopener">← กลับหน้าแรก</a>
                <span class="text-muted"> · </span>
                <a href="/member" target="_top" rel="noopener">พื้นที่สมาชิก</a>
                <span class="text-muted"> · </span>
                <a href="/hui/login" target="_top" rel="noopener">เข้าด้วยยูสเซอร์/รหัส (หน้าเดิม)</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="/purdue-template/assets/js/jquery-1.12.4.min.js"></script>
    <script src="/purdue-template/assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="/purdue-template/assets/owlcarousel/js/owl.carousel.min.js"></script>
    <script src="/purdue-template/assets/js/jquery-simple-mobilemenu.js"></script>
    <script src="/purdue-template/assets/js/jquery.slicknav.js"></script>
    <script src="/purdue-template/assets/js/jquery.magnific-popup.min.js"></script>
    <script src="/purdue-template/assets/js/jquery.mixitup.js"></script>
    <script src="/purdue-template/assets/js/scrolltopcontrol.js"></script>
    <script src="/purdue-template/assets/js/gsap.min.js"></script>
    <script src="/purdue-template/assets/js/ScrollTrigger.min.js"></script>
    <script src="/purdue-template/assets/js/lenis.js"></script>
    <script src="/purdue-template/assets/js/purecounter_vanilla.js"></script>
    <script src="/purdue-template/assets/js/wow.min.js"></script>
    <script src="/purdue-template/assets/js/scripts.js"></script>
    <script>
      document.getElementById("hui-login-btn").addEventListener("click", function () {
        window.top.location.href = "/hui/login";
      });
    </script>
  </body>
</html>
